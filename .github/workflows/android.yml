name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Build Web Application
        run: npm run build

      - name: Sync Capacitor
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Configure App Name and Icon
        run: |
          # 1. Set app name to Kalkulyator in Android resources
          sed -i 's/<string name="app_name">.*<\/string>/<string name="app_name">Kalkulyator<\/string>/g' android/app/src/main/res/values/strings.xml || true
          sed -i 's/Capacitor App/Kalkulyator/g' android/app/src/main/res/values/strings.xml || true
          sed -i 's/My App/Kalkulyator/g' android/app/src/main/res/values/strings.xml || true
          
          # 2. Download custom icon
          curl -sL "https://lh5.ggpht.com/XJIPVm71Icy7mlESQeMie6XY2PEG7p2YE3hERXBu2ZLI78cGjWSjsUp-q0aUiQ4QrUg=w300" -o custom_icon.png
          
          # 3. Replace all mipmap png launcher icons
          for dir in hdpi mdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p android/app/src/main/res/mipmap-${dir}
            cp custom_icon.png android/app/src/main/res/mipmap-${dir}/ic_launcher.png
            cp custom_icon.png android/app/src/main/res/mipmap-${dir}/ic_launcher_round.png
          done
          
          # 4. Remove adaptive XML launcher icons to force using our PNG icons on all launchers
          rm -f android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          rm -f android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kalkulyator-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
